x-backend-build: &backend-build
  context: ../..
  dockerfile: server/Dockerfile

x-nginx-build: &nginx-build
  context: ../..
  dockerfile: deployments/docker/nginx.Dockerfile

x-backend-environment: &backend-environment
  APP_ENV: production
  SERVICE_NAME: netstamp-api
  APP_VERSION: ${APP_VERSION:-v1}
  API_VERSION: ${API_VERSION:-v1}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_PSEUDONYM_KEY: ${LOG_PSEUDONYM_KEY:?set LOG_PSEUDONYM_KEY}
  BACKEND_BASE_URL: ${BACKEND_BASE_URL:-}
  HTTP_ADDR: :8080
  GRPC_ADDR: :9090
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USER: netstamp
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
  DATABASE_NAME: netstamp
  DATABASE_SSLMODE: disable
  DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
  DB_MIN_CONNS: ${DB_MIN_CONNS:-0}
  DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-1h}
  DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-30m}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set AUTH_JWT_SECRET}
  AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL:-12h}
  AUTH_ARGON2ID_MEMORY_KIB: ${AUTH_ARGON2ID_MEMORY_KIB:-65536}
  AUTH_ARGON2ID_ITERATIONS: ${AUTH_ARGON2ID_ITERATIONS:-3}
  AUTH_ARGON2ID_PARALLELISM: ${AUTH_ARGON2ID_PARALLELISM:-4}

services:
  postgres:
    image: ${TIMESCALEDB_IMAGE:-timescale/timescaledb:2.26.4-pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: netstamp
      POSTGRES_USER: netstamp
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
    volumes:
      - netstamp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netstamp -d netstamp"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      - netstamp.logs=enabled

  migrate:
    image: netstamp-api:${NETSTAMP_IMAGE_TAG:-local}
    build: *backend-build
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *backend-environment
    entrypoint: ["/app/netstamp-migrate"]
    command: ["-command", "up", "-dir", "/app/db/migrations"]
    labels:
      - netstamp.logs=enabled

  backend:
    image: netstamp-api:${NETSTAMP_IMAGE_TAG:-local}
    build: *backend-build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      victoria-traces:
        condition: service_started
    environment:
      <<: *backend-environment
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://victoria-traces:10428/insert/opentelemetry/v1/traces
    expose:
      - "8080"
      - "9090"
    labels:
      - netstamp.logs=enabled

  nginx:
    image: netstamp-web:${NETSTAMP_IMAGE_TAG:-local}
    build: *nginx-build
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    expose:
      - "80"
      - "9090"
    labels:
      - netstamp.logs=enabled
    networks:
      - dokploy-network
      - default

  victoria-traces:
    image: ${VICTORIA_TRACES_IMAGE:-victoriametrics/victoria-traces:v0.8.2}
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-traces-data
      - -retentionPeriod=${VICTORIA_TRACES_RETENTION_PERIOD:-7d}
    volumes:
      - netstamp-victoria-traces:/victoria-traces-data
    labels:
      - netstamp.logs=enabled

  victoria-logs:
    image: ${VICTORIA_LOGS_IMAGE:-victoriametrics/victoria-logs:v1.50.0}
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=${VICTORIA_LOGS_RETENTION_PERIOD:-14d}
    volumes:
      - netstamp-victoria-logs:/victoria-logs-data
    labels:
      - netstamp.logs=enabled

  vector:
    image: ${VECTOR_IMAGE:-timberio/vector:0.55.0-alpine}
    restart: unless-stopped
    user: root
    depends_on:
      victoria-logs:
        condition: service_started
    command: ["--config", "/etc/vector/vector.yaml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0}
    restart: unless-stopped
    depends_on:
      victoria-traces:
        condition: service_started
      victoria-logs:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ${GF_INSTALL_PLUGINS:-victoriametrics-logs-datasource}
    expose:
      - "3000"
    volumes:
      - netstamp-grafana:/var/lib/grafana
      - ./grafana/provisioning.production:/etc/grafana/provisioning:ro
    labels:
      - netstamp.logs=enabled
    networks:
      - dokploy-network
      - default

volumes:
  netstamp-postgres:
  netstamp-victoria-traces:
  netstamp-victoria-logs:
  netstamp-grafana:

networks:
  dokploy-network:
    external: true
