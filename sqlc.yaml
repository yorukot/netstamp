version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "server/db/migrations"
    queries:
      - "server/db/query"
    gen:
      go:
        package: "sqlc"
        out: "internal/infrastructure/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
