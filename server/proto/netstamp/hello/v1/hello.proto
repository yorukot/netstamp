syntax = "proto3";

package netstamp.hello.v1;

option go_package = "github.com/yorukot/netstamp/api/gen/go/netstamp/hello/v1;hellov1";

service HelloService {
  rpc GetGreeting(GetGreetingRequest) returns (GetGreetingResponse);
}

message GetGreetingRequest {}

message GetGreetingResponse {
  string message = 1;
  string service = 2;
}
